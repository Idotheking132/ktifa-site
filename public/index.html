<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>קטיפה - קביעת תורים</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar">
    <div class="nav-brand">
      <span class="brand-icon">✂️</span>
      <span class="brand-name">קטיפה</span>
    </div>
    <div id="navActions"></div>
  </nav>

  <div id="app">

    <!-- Login Page -->
    <div id="loginPage" class="page hidden">
      <div class="login-wrap">
        <div class="login-logo">✂️</div>
        <h1>קביעת תורים</h1>
        <p>התחבר עם Discord כדי לקבוע תור</p>
        <button class="discord-btn" onclick="login()">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057c.002.022.015.043.033.055a19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028 14.09 14.09 0 0 0 1.226-1.994.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03z"/></svg>
          התחבר עם Discord
        </button>
        <div id="loginError" class="login-error hidden"></div>
      </div>
    </div>

    <!-- Main Dashboard -->
    <div id="dashboard" class="page hidden">
      <div class="tabs-bar">
        <button class="tab active" data-tab="book">קביעת תור</button>
        <button class="tab" data-tab="schedule">לוח תורים</button>
        <button class="tab" data-tab="my">התורים שלי</button>
        <button class="tab admin-only hidden" data-tab="admin">ניהול</button>
      </div>

      <!-- Book -->
      <div class="tab-pane active" id="tab-book">
        <div class="pane-header">
          <h2>קבע תור</h2>
          <p>בחר ספר, יום ושעה</p>
        </div>
        <div id="bookingFlow">
          <!-- Step 1: pick worker -->
          <div id="step1">
            <div class="step-label">בחר ספר</div>
            <div class="workers-grid" id="workersGrid">
              <div class="loading">טוען...</div>
            </div>
          </div>
          <!-- Step 2: pick day -->
          <div id="step2" class="hidden">
            <button class="back-btn" onclick="goStep(1)">← חזור</button>
            <div class="step-label">בחר יום</div>
            <div class="days-row" id="daysRow"></div>
          </div>
          <!-- Step 3: pick time -->
          <div id="step3" class="hidden">
            <button class="back-btn" onclick="goStep(2)">← חזור</button>
            <div class="step-label" id="step3Label">בחר שעה</div>
            <div class="times-grid" id="timesGrid"></div>
          </div>
        </div>
      </div>

      <!-- Schedule -->
      <div class="tab-pane hidden" id="tab-schedule">
        <div class="pane-header">
          <h2>לוח תורים</h2>
          <p>כל התורים של השבוע הקרוב</p>
        </div>
        <div id="scheduleView"></div>
      </div>

      <!-- My appointments -->
      <div class="tab-pane hidden" id="tab-my">
        <div class="pane-header">
          <h2>התורים שלי</h2>
        </div>
        <div id="myList"></div>
      </div>

      <!-- Admin -->
      <div class="tab-pane hidden" id="tab-admin">
        <div class="admin-layout">
          <div class="admin-menu">
            <button class="amenu active" data-asec="workers">ספרים</button>
            <button class="amenu" data-asec="allAppts">כל הבקשות</button>
          </div>
          <div class="admin-body">
            <div class="asec active" id="asec-workers">
              <div class="asec-head">
                <h3>ניהול ספרים</h3>
                <button class="btn-add" onclick="openWorkerModal()">+ הוסף ספר</button>
              </div>
              <div id="workersList"></div>
            </div>
            <div class="asec hidden" id="asec-allAppts">
              <div class="asec-head"><h3>כל הבקשות</h3></div>
              <div id="allApptsList"></div>
            </div>
          </div>
        </div>
      </div>
    </div>

  </div>

  <!-- Booking confirm modal -->
  <div class="modal-bg hidden" id="confirmModal">
    <div class="modal">
      <div class="modal-top">
        <h3>אישור קביעת תור</h3>
        <button class="modal-x" onclick="closeModal('confirmModal')">✕</button>
      </div>
      <div class="modal-body">
        <div class="confirm-details" id="confirmDetails"></div>
        <div class="form-group">
          <label>הערה (אופציונלי)</label>
          <textarea id="bookNote" placeholder="הוסף הערה..." rows="3"></textarea>
        </div>
      </div>
      <div class="modal-foot">
        <button class="btn-ghost" onclick="closeModal('confirmModal')">ביטול</button>
        <button class="btn-confirm" onclick="submitBooking()">שלח בקשה</button>
      </div>
    </div>
  </div>

  <!-- Worker modal -->
  <div class="modal-bg hidden" id="workerModal">
    <div class="modal">
      <div class="modal-top">
        <h3 id="workerModalTitle">הוסף ספר</h3>
        <button class="modal-x" onclick="closeModal('workerModal')">✕</button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="wId" />
        <div class="form-group">
          <label>שם הספר</label>
          <input type="text" id="wName" placeholder="לדוגמה: ידו" />
        </div>
        <div class="form-group">
          <label>צבע</label>
          <input type="color" id="wColor" value="#6366f1" />
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>שעת התחלה</label>
            <input type="time" id="wStart" value="09:00" />
          </div>
          <div class="form-group">
            <label>שעת סיום</label>
            <input type="time" id="wEnd" value="18:00" />
          </div>
        </div>
        <div class="form-group">
          <label>משך תור</label>
          <select id="wDuration">
            <option value="30">30 דקות</option>
            <option value="60">שעה</option>
            <option value="90">שעה וחצי</option>
            <option value="120">שעתיים</option>
          </select>
        </div>
        <div class="form-group">
          <label>ימי עבודה</label>
          <div class="days-check" id="wDays">
            <label><input type="checkbox" value="0" /> א'</label>
            <label><input type="checkbox" value="1" /> ב'</label>
            <label><input type="checkbox" value="2" /> ג'</label>
            <label><input type="checkbox" value="3" /> ד'</label>
            <label><input type="checkbox" value="4" /> ה'</label>
            <label><input type="checkbox" value="5" /> ו'</label>
            <label><input type="checkbox" value="6" /> ש'</label>
          </div>
        </div>
        <div class="form-group">
          <label class="check-label">
            <input type="checkbox" id="wActive" checked /> פעיל
          </label>
        </div>
      </div>
      <div class="modal-foot">
        <button class="btn-ghost" onclick="closeModal('workerModal')">ביטול</button>
        <button class="btn-confirm" onclick="saveWorker()">שמור</button>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast" class="toast hidden"></div>

  <script src="app.js"></script>
</body>
</html>
